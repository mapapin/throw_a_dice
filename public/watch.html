<!doctype html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ginse Dice — Régie live</title><link rel="stylesheet" href="/styles.css">
<style>.watch{width:min(1100px,92vw);margin:45px auto}.watch-head{display:flex;justify-content:space-between;align-items:end;margin-bottom:20px}.watch h1{font-size:clamp(42px,7vw,86px);line-height:.85}.feed{aspect-ratio:16/9;background:#171914;border:1px solid #10110d;box-shadow:8px 8px 0 #10110d;position:relative}.feed img{width:100%;height:100%;object-fit:contain}.feed-status{position:absolute;top:15px;left:15px;background:#10110d;color:#eaff45;padding:10px;font:11px DM Mono}.debug{margin-top:36px}.crops{display:flex;gap:14px;min-height:112px;flex-wrap:wrap}.crop{background:#10110d;color:white;padding:10px;display:grid;grid-template-columns:76px auto;gap:10px;align-items:center}.crop img{width:76px;height:76px;image-rendering:pixelated;background:#000;border:1px solid #777}.crop b{font:26px DM Mono;color:#eaff45}.crop small{display:block;font:10px DM Mono;color:#aaa;margin-top:5px}.crop.rejected b{color:#ff766d}.try{margin-top:38px;border-top:1px solid;padding-top:25px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}.try input{width:90px;padding:14px;border:1px solid;font:16px DM Mono}.try button{padding:15px 22px;background:#eaff45;border:1px solid;font-weight:800;cursor:pointer}.try code{padding:14px;background:#e6e3da}</style></head>
<body><header class="nav"><a class="brand" href="/"><span class="brand-mark">G</span><span>GINSE / DICE</span></a><div class="live"><i></i> RÉGIE LIVE</div></header><main class="watch"><div class="watch-head"><div><p class="eyebrow">REMOTE VIEW</p><h1>LE MONDE<br><em>EN DIRECT.</em></h1></div><span id="health" class="status">CONNEXION…</span></div><div class="feed"><img id="feed" alt="Flux vidéo du téléphone"><span class="feed-status">PHONE CAM 01</span></div><section class="debug"><div class="step-label"><span>DEBUG</span> CROPS ENVOYÉS AU CNN</div><div id="crops" class="crops"><span class="status">Lance une requête pour voir les crops.</span></div></section><div class="try"><strong>TESTER L’API</strong><input id="count" type="number" min="1" max="8" value="2"><button id="roll">ATTENDRE UN LANCER</button><code id="result">—</code></div></main>
<script>const feed=document.querySelector('#feed'),health=document.querySelector('#health'),crops=document.querySelector('#crops');setInterval(()=>{feed.src='/api/stream/latest.jpg?t='+Date.now();fetch('/api/health').then(r=>r.json()).then(h=>health.textContent=h.phoneOnline?'● TÉLÉPHONE EN LIGNE':'TÉLÉPHONE HORS LIGNE');fetch('/api/debug/crops').then(r=>r.json()).then(({crops:items})=>{if(!items.length)return;crops.innerHTML=items.map(c=>`<div class="crop ${c.valid?'':'rejected'}"><img src="${c.image}"><div><b>${c.value}</b><small>${Math.round(c.confidence*100)}% · ${c.valid?'ACCEPTÉ':'REJETÉ'}</small></div></div>`).join('')})},800);document.querySelector('#roll').onclick=async()=>{const b=document.querySelector('#roll'),out=document.querySelector('#result');b.disabled=true;b.textContent='EN ATTENTE…';out.textContent='Lancez les dés devant le téléphone';try{const r=await fetch('/api/roll/wait',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({count:+document.querySelector('#count').value})});out.textContent=JSON.stringify(await r.json())}finally{b.disabled=false;b.textContent='ATTENDRE UN LANCER'}};</script></body></html>
